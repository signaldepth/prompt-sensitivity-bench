<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Signal Depth E15 launch card</title>
  <desc id="desc">Making prompts longer did not help. Explicit task contracts did. short sparse 0.25, long sparse 0.25, short dense 1.00, long dense 1.00.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#0b0b0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#090909"/>
  <rect x="36" y="32" width="1128" height="566" rx="12" fill="url(#panel)" stroke="#262626"/>

  <text x="72" y="88" fill="#ffcc66" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Signal Depth</text>
  <text x="72" y="156" fill="#f4f4f4" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">Making prompts longer</text>
  <text x="72" y="220" fill="#f4f4f4" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">did not help.</text>
  <text x="72" y="288" fill="#ffcc66" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">Explicit task contracts did.</text>

  <text x="72" y="352" fill="#c7c7c7" font-family="Inter, Arial, sans-serif" font-size="25">Deterministic Python code tasks, 4 local-model runs</text>
  <text x="72" y="387" fill="#c7c7c7" font-family="Inter, Arial, sans-serif" font-size="25">k=3, temperature 0.0</text>

  <g transform="translate(72 414)">
    <text x="0" y="0" fill="#a0a0a0" font-family="JetBrains Mono, Menlo, monospace" font-size="20">Condition</text>
    <text x="250" y="0" fill="#a0a0a0" font-family="JetBrains Mono, Menlo, monospace" font-size="20">Pass rate</text>

    <text x="0" y="44" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">short_sparse</text>
    <text x="250" y="44" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">0.25</text>

    <text x="0" y="92" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">long_sparse</text>
    <text x="250" y="92" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">0.25</text>

    <text x="0" y="140" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">short_dense</text>
    <text x="250" y="140" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">1.00</text>

    <text x="0" y="188" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">long_dense</text>
    <text x="250" y="188" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="28">1.00</text>
  </g>

  <g transform="translate(700 110)">
    <text x="0" y="0" fill="#d0d0d0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">E15 context-budget result</text>

    <g transform="translate(0 54)">
      <line x1="0" y1="0" x2="0" y2="320" stroke="#333333"/>
      <line x1="0" y1="320" x2="380" y2="320" stroke="#333333"/>
      <line x1="0" y1="240" x2="380" y2="240" stroke="#242424"/>
      <line x1="0" y1="160" x2="380" y2="160" stroke="#242424"/>
      <line x1="0" y1="80" x2="380" y2="80" stroke="#242424"/>

      <text x="-8" y="326" fill="#8f8f8f" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="end">0.0</text>
      <text x="-8" y="246" fill="#8f8f8f" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="end">0.25</text>
      <text x="-8" y="166" fill="#8f8f8f" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="end">0.50</text>
      <text x="-8" y="86" fill="#8f8f8f" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="end">0.75</text>
      <text x="-8" y="6" fill="#8f8f8f" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="end">1.0</text>

      <rect x="22" y="240" width="62" height="80" rx="4" fill="#ffcc66"/>
      <rect x="112" y="240" width="62" height="80" rx="4" fill="#66ccff"/>
      <rect x="202" y="0" width="62" height="320" rx="4" fill="#b6e880"/>
      <rect x="292" y="0" width="62" height="320" rx="4" fill="#ff6666"/>

      <text x="53" y="228" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="18" text-anchor="middle">0.25</text>
      <text x="143" y="228" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="18" text-anchor="middle">0.25</text>
      <text x="233" y="-12" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="18" text-anchor="middle">1.00</text>
      <text x="323" y="-12" fill="#f0f0f0" font-family="JetBrains Mono, Menlo, monospace" font-size="18" text-anchor="middle">1.00</text>

      <text x="53" y="352" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">short</text>
      <text x="53" y="372" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">sparse</text>

      <text x="143" y="352" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">long</text>
      <text x="143" y="372" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">sparse</text>

      <text x="233" y="352" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">short</text>
      <text x="233" y="372" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">dense</text>

      <text x="323" y="352" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">long</text>
      <text x="323" y="372" fill="#d7d7d7" font-family="JetBrains Mono, Menlo, monospace" font-size="16" text-anchor="middle">dense</text>
    </g>
  </g>
</svg>
