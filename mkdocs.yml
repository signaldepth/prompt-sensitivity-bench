site_name: Signal Depth
site_description: "Open benchmark measuring how prompt wording changes LLM outputs. Latest E15 result: longer prompts did not help; explicit task contracts did."
site_url: https://signaldepth.ai/
repo_url: https://github.com/signaldepth/prompt-sensitivity-bench
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: black
      accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Findings:
      - Specificity: findings/specificity.md
      - Context budget: findings/context-budget.md
      - Complexity: findings/complexity.md
      - Filler words: findings/filler.md
      - Format preference: findings/format.md
      - k=1 trap: findings/k1-trap.md
      - DeMorgan inversion: findings/demorgan.md
  - Methodology: methodology.md
  - Data: data.md
  - Contribute: contribute.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - tables
  - footnotes
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search
