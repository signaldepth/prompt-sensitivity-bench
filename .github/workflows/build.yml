name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/configure-pages@v5
      - run: sudo apt-get update && sudo apt-get install -y librsvg2-bin
      - run: pip install mkdocs-material
      - run: python scripts/check_public_repo.py
      - run: python scripts/validate_public_data.py
      - run: python scripts/plot.py
      - run: python scripts/generate_social_cards.py
      - run: mkdocs build
      - run: cp CNAME site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
